<div class="container">
  <h2 class="mt-4">Ajouter un avis</h2>
  <form (ngSubmit)="submitReview()" #reviewForm="ngForm">
    <div class="mb-3">
      <label for="title" class="form-label">Titre</label>
      <input
        type="text"
        id="title"
        [(ngModel)]="review.title"
        name="title"
        class="form-control"
        required
      />
    </div>

    <div class="mb-3">
      <label for="content" class="form-label">Contenu</label>
      <textarea
        id="content"
        [(ngModel)]="review.content"
        name="content"
        class="form-control"
        required
      ></textarea>
    </div>

    <div class="mb-3">
      <label for="stars" class="form-label">Étoiles</label>
      <input
        type="number"
        id="stars"
        [(ngModel)]="review.stars"
        name="stars"
        class="form-control"
        min="1"
        max="5"
        required
      />
    </div>

    <button type="submit" class="btn btn-success">Soumettre</button>
  </form>

  <div *ngIf="sentiment" class="mt-3">
    <h3>Analyse de sentiment</h3>
    <p style="color: red; font-weight: bold;">
      Le sentiment associé à cet avis est : <strong>{{ sentiment }}</strong>
    </p>
  </div>
</div>
